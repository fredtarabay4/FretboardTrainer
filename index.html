<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fretboard Master Pro</title>
    <style>
        :root { 
            --bg: #1a1a1a; --card: #2d2d2d; --accent: #e74c3c; --text: #f0f0f0; 
            --fret: #c0c0c0; --nut: #000; --string: #ddd; --highlight: #2ecc71; --target: #ffeb3b; 
        }
        body { 
            font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; touch-action: manipulation;
        }
        .container { width: 100%; max-width: 1400px; text-align: center; }
        
        .settings { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 15px; text-align: left; }
        select { width: 100%; padding: 10px; background: #444; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
        
        .fb-container { 
            width: 100%; 
            overflow-x: auto; 
            background: #111; 
            border-radius: 10px; 
            margin: 15px 0;
            border: 2px solid #444;
            -webkit-overflow-scrolling: touch;
        }

        .fretboard { 
            display: grid; 
            background: #3d2b1f; 
            width: 100%; 
            /* Reduced min-width to fit the Pixel 9 Pro XL screen better */
            min-width: 440px; 
            height: 240px; 
            /* Narrow Nut (30px), then 12 equal flexible frets */
            grid-template-columns: 30px repeat(12, 1fr); 
        }

        .fret { 
            border-right: 1.5px solid var(--fret); 
            position: relative; 
            display: flex; 
            flex-direction: column-reverse; 
            justify-content: space-around;
            height: 100%;
        }

        .nut { border-right: 8px solid var(--nut) !important; background: rgba(0,0,0,0.4); }
        
        /* Smaller dots for the smaller frets */
        .dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 12px; height: 12px; background: #888; border-radius: 50%; z-index: 1; pointer-events: none; }
        .double-dot-top { top: 25%; }
        .double-dot-bottom { top: 75%; }

        .str { height: var(--t); background: var(--string); width: 100%; position: relative; z-index: 2; cursor: pointer; display: flex; align-items: center; }
        .str.disabled { opacity: 0.05; pointer-events: none; }
        .str.target { background: var(--target); box-shadow: 0 0-10px var(--target); }
        
        /* Marker adjusted for smaller fret width */
        .marker { position: absolute; width: 28px; height: 28px; border-radius: 50%; background: var(--highlight); left: 50%; transform: translateX(-50%); display: none; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .active-n .marker { display: block; }
        
        .string-selector { display: flex; gap: 8px; justify-content: center; margin: 10px 0; flex-wrap: wrap; }
        .s-btn { background: #444; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-weight: bold; border: 2px solid transparent; font-size: 0.8rem; }
        .s-btn.active { background: var(--accent); border-color: #fff; }

        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; width: 100%; }
        .n-btn { padding: 12px; border-radius: 8px; background: #444; color: #fff; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; }
        #feedback { font-weight: bold; font-size: 1.1rem; height: 25px; margin-top: 5px; }

        @media (min-width: 1000px) {
            .fretboard { height: 300px; }
            .marker { width: 34px; height: 34px; }
            .dot { width: 18px; height: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-size: 1.5rem; margin: 0 0 10px 0;">Fretboard Master</h1>
        <div class="settings">
            <div>
                <select id="inst">
                    <option value="bass4">4-String Bass (EADG)</option>
                    <option value="bass5">5-String Bass (BEADG)</option>
                    <option value="guitar">6-String Guitar (EADGBE)</option>
                </select>
            </div>
            <div>
                <select id="mode">
                    <option value="find">Find Note</option>
                    <option value="target">Target String</option>
                    <option value="id">Identify Note</option>
                </select>
            </div>
        </div>
        <div style="text-align: left; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; font-size: 0.9rem;">
            <input type="checkbox" id="acc" style="width: 18px; height: 18px;"> 
            <label for="acc">Include Sharps</label>
        </div>
        <div class="string-selector" id="toggles"></div>
        <div class="drill-area">
            <div id="prompt-txt" style="font-size: 1rem; opacity: 0.8;">Find:</div>
            <div id="prompt-display" style="font-size: 3rem; font-weight: 900; color: var(--highlight);">C</div>
            <div id="feedback"></div>
        </div>
        <div class="fb-container">
            <div class="fretboard" id="board"></div>
        </div>
        <div class="btn-grid" id="btns"></div>
    </div>
