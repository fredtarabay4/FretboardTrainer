<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fretboard Master Pro</title>
    <style>
        :root { 
            --bg: #1a1a1a; --card: #2d2d2d; --accent: #e74c3c; --text: #f0f0f0; 
            --fret: #c0c0c0; --nut: #000; --string: #ddd; --highlight: #2ecc71; --target: #ffeb3b; 
        }
        body { 
            font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; touch-action: manipulation;
        }
        .container { width: 100%; max-width: 1000px; text-align: center; }
        
        .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; text-align: left; }
        select { width: 100%; padding: 12px; background: #444; color: #fff; border: none; border-radius: 8px; font-size: 1rem; }
        
        /* The Window */
        .fb-container { 
            width: 100%; 
            overflow-x: auto; 
            background: #111; 
            border-radius: 12px; 
            margin: 20px 0;
            border: 2px solid #444;
            display: block;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        /* The Board - Fixed Width Math: 13 columns * 90px = 1170px */
        .fretboard { 
            display: grid; 
            background: #3d2b1f; 
            width: 1170px; 
            height: 280px; 
            grid-template-columns: repeat(13, 90px);
        }

        .fret { 
            border-right: 2px solid var(--fret); 
            position: relative; 
            display: flex; 
            flex-direction: column-reverse; 
            justify-content: space-around;
            height: 100%;
        }

        /* Distinct Nut */
        .nut { border-right: 12px solid var(--nut) !important; background: rgba(0,0,0,0.4); width: 90px; }
        
        .dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 18px; height: 18px; background: #888; border-radius: 50%; z-index: 1; }
        .double-dot-top { top: 25%; }
        .double-dot-bottom { top: 75%; }

        .str { height: var(--t); background: var(--string); width: 100%; position: relative; z-index: 2; cursor: pointer; display: flex; align-items: center; }
        .str.disabled { opacity: 0.05; pointer-events: none; }
        .str.target { background: var(--target); box-shadow: 0 0 15px var(--target); }
        
        .marker { position: absolute; width: 36px; height: 36px; border-radius: 50%; background: var(--highlight); left: 50%; transform: translateX(-50%); display: none; border: 3px solid #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .active-n .marker { display: block; }
        
        .string-selector { display: flex; gap: 10px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        .s-btn { background: #444; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; border: 2px solid transparent; }
        .s-btn.active { background: var(--accent); border-color: #fff; }

        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .n-btn { padding: 15px; border-radius: 10px; background: #444; color: #fff; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        #feedback { font-weight: bold; font-size: 1.2rem; height: 30px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fretboard Master</h1>
        <div class="settings">
            <select id="inst">
                <option value="bass4">4-String Bass (EADG)</option>
                <option value="bass5">5-String Bass (BEADG)</option>
                <option value="guitar">6-String Guitar (EADGBE)</option>
            </select>
            <select id="mode">
                <option value="find">Find Note</option>
                <option value="target">Target String</option>
                <option value="id">Identify Note</option>
            </select>
        </div>
        <div style="text-align: left; margin-bottom: 10px; display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" id="acc" style="width: 20px; height: 20px;"> Include Sharps
        </div>
        <div class="string-selector" id="toggles"></div>
        <div class="drill-area">
            <div id="prompt-txt" style="font-size: 1.1rem; opacity: 0.8;">Find:</div>
            <div id="prompt-display">C</div>
            <div id="feedback"></div>
        </div>
        <div class="fb-container">
            <div class="fretboard" id="board"></div>
        </div>
        <div class="btn-grid" id="btns"></div>
    </div>

    <script>
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const tunings = { bass4: ['E','A','D','G'], bass5: ['B','E','A','D','G'], guitar: ['E','A','D','G','B','E'] };
        let active = [0,1,2,3], currentN = null, targetS = null;

        function render() {
            const b = document.getElementById('board'), inst = document.getElementById('inst').value, t = tunings[inst];
            b.innerHTML = ''; 
            for(let f=0; f<=12; f++) {
                const div = document.createElement('div'); div.className = `fret ${f===0?'nut':''}`;
                if([3,5,7,9].includes(f)) div.innerHTML = '<div class="dot"></div>';
                if(f===12) div.innerHTML = '<div class="dot double-dot-top"></div><div class="dot double-dot-bottom"></div>';
                t.forEach((o, s) => {
                    const l = document.createElement('div');
                    l.className = `str ${active.includes(s)?'':'disabled'}`;
                    l.style.setProperty('--t', `${3+(t.length-s)}px`);
                    l.dataset.n = notes[(notes.indexOf(o)+f)%12]; l.dataset.s = s;
                    l.innerHTML = '<div class="marker"></div>';
                    if(active.includes(s)) l.onclick = () => checkF(l.dataset.n, l);
                    div.appendChild(l);
                });
                b.appendChild(div);
            }
        }

        function updateT() {
            const c = document.getElementById('toggles'), t = tunings[document.getElementById('inst').value];
            c.innerHTML = '';
            t.forEach((n, i) => {
                const b = document.createElement('div'); b.className = `s-btn ${active.includes(i)?'active':''}`;
                b.innerText = n; b.onclick = () => {
                    active = active.includes(i) ? (active.length>1?active.filter(x=>x!==i):active) : [...active, i];
                    updateT(); render(); next();
                };
                c.appendChild(b);
            });
        }

        function next() {
            const acc = document.getElementById('acc').checked, pool = notes.filter(n => acc || !n.includes('#')), m = document.getElementById('mode').value;
            document.querySelectorAll('.active-n, .target').forEach(e => e.classList.remove('active-n', 'target'));
            document.getElementById('feedback').innerText = ''; targetS = null;
            if(m==='id') {
                document.getElementById('btns').style.display='grid'; document.getElementById('prompt-display').innerText='?';
                const lines = Array.from(document.querySelectorAll('.str:not(.disabled)')).filter(l => pool.includes(l.dataset.n));
                if(lines.length) {
                    const p = lines[Math.floor(Math.random()*lines.length)]; p.classList.add('active-n'); currentN = p.dataset.n;
                }
            } else {
                document.getElementById('btns').style.display='none'; currentN = pool[Math.floor(Math.random()*pool.length)];
                document.getElementById('prompt-display').innerText = currentN;
                if(m==='target') {
                    targetS = active[Math.floor(Math.random()*active.length)];
                    document.getElementById('prompt-txt').innerText = `Find ${currentN} on highlighted string:`;
                    document.querySelectorAll(`.str[data-s="${targetS}"]`).forEach(s => s.classList.add('target'));
                } else {
                    document.getElementById('prompt-txt').innerText = `Find any ${currentN}:`;
                }
            }
        }

        function checkF(n, el) {
            if(document.getElementById('mode').value==='id') return;
            if(targetS !== null && parseInt(el.dataset.s) !== targetS) return;
            if(n === currentN) { el.classList.add('active-n'); feedback(true); setTimeout(next, 800); }
            else feedback(false);
        }

        function checkB(n) {
            if(n === currentN) { feedback(true); setTimeout(next, 800); }
            else feedback(false);
        }

        function feedback(c) {
            const f = document.getElementById('feedback'); f.innerText = c ? "Nice! ✓" : "Wrong ✗"; f.style.color = c ? "var(--highlight)" : "var(--accent)";
        }

        document.getElementById('inst').onchange = (e) => { active = Array.from({length:tunings[e.target.value].length}, (_,i)=>i); updateT(); render(); next(); };
        document.getElementById('mode').onchange = next;
        document.getElementById('acc').onchange = () => {
            const cont = document.getElementById('btns'), acc = document.getElementById('acc').checked;
            cont.innerHTML = ''; notes.filter(n => acc || !n.includes('#')).forEach(n => {
                const b = document.createElement('button'); b.className = 'n-btn'; b.innerText = n; b.onclick = () => checkB(n); cont.appendChild(b);
            });
            next();
        };

        updateT(); render(); 
        const cont = document.getElementById('btns'); notes.filter(n => !n.includes('#')).forEach(n => {
            const b = document.createElement('button'); b.className = 'n-btn'; b.innerText = n; b.onclick = () => checkB(n); cont.appendChild(b);
        });
        next();
    </script>
</body>
</html>
