<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fretboard Master Pro</title>
    <style>
        :root { 
            --bg: #1a1a1a; --card: #2d2d2d; --accent: #e74c3c; --text: #f0f0f0; 
            --fret: #c0c0c0; --nut: #000; --string: #ddd; --highlight: #2ecc71; --target: #ffeb3b; 
        }
        body { 
            font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; touch-action: manipulation;
        }
        .container { width: 100%; max-width: 1400px; text-align: center; }
        
        .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        select { width: 100%; padding: 10px; background: #444; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; }
        
        .fb-container { 
            width: 100%; 
            overflow-x: auto; 
            background: #111; 
            border-radius: 10px; 
            margin: 10px 0;
            border: 2px solid #444;
            -webkit-overflow-scrolling: touch;
        }

        .fretboard { 
            display: grid; 
            background: #3d2b1f; 
            width: 100%; 
            min-width: 440px; /* Fits Pixel 9 Pro XL width */
            height: 220px; 
            grid-template-columns: 30px repeat(12, 1fr); 
        }

        .fret { 
            border-right: 1.5px solid var(--fret); 
            position: relative; 
            display: flex; 
            flex-direction: column-reverse; 
            justify-content: space-around;
            padding: 5px 0;
        }

        .nut { border-right: 8px solid var(--nut) !important; background: rgba(0,0,0,0.4); }
        
        .dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 12px; height: 12px; background: #888; border-radius: 50%; z-index: 1; pointer-events: none; }
        .double-dot-top { top: 25%; }
        .double-dot-bottom { top: 75%; }

        /* The String itself */
        .str { 
            height: 10px; /* Hitbox for the string */
            width: 100%; 
            position: relative; 
            z-index: 2; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
        }
        /* The Visual Line inside the hitbox */
        .str::after {
            content: '';
            width: 100%;
            height: var(--t);
            background: var(--string);
            display: block;
        }
        .str.disabled { opacity: 0.05; pointer-events: none; }
        .str.target::after { background: var(--target); box-shadow: 0 0 10px var(--target); }
        
        .marker { 
            position: absolute; 
            width: 26px; height: 26px; 
            border-radius: 50%; 
            background: var(--highlight); 
            left: 50%; transform: translateX(-50%); 
            display: none; border: 2px solid #fff; 
            z-index: 3;
        }
        .active-n .marker { display: block; }
        
        .string-selector { display: flex; gap: 5px; justify-content: center; margin: 5px 0; flex-wrap: wrap; }
        .s-btn { background: #444; padding: 6px 12px; border-radius: 15px; font-weight: bold; font-size: 0.8rem; border: 2px solid transparent; }
        .s-btn.active { background: var(--accent); border-color: #fff; }

        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
        .n-btn { padding: 10px; border-radius: 8px; background: #444; color: #fff; border: none; font-weight: bold; }
        #feedback { font-weight: bold; font-size: 1rem; height: 20px; margin: 5px 0; }

        @media (min-width: 1000px) {
            .fretboard { height: 300px; }
            .marker { width: 34px; height: 34px; }
            .dot { width: 18px; height: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-size: 1.2rem; margin: 5px 0;">Fretboard Master</h1>
        <div class="settings">
            <select id="inst">
                <option value="bass4">4-String Bass (EADG)</option>
                <option value="bass5">5-String Bass (BEADG)</option>
                <option value="guitar">6-String Guitar (EADGBE)</option>
            </select>
            <select id="mode">
                <option value="find">Find Note</option>
                <option value="target">Target String</option>
                <option value="id">Identify Note</option>
            </select>
        </div>
        <div style="text-align: left; margin: 5px 0; display: flex; align-items: center; gap: 8px; font-size: 0.8rem;">
            <input type="checkbox" id="acc" style="width: 16px; height: 16px;"> 
            <label for="acc">Include Sharps</label>
        </div>
        <div class="string-selector" id="toggles"></div>
        <div class="drill-area">
            <div id="prompt-display" style="font-size: 2.5rem; font-weight: 900; color: var(--highlight);">C</div>
            <div id="feedback"></div>
        </div>
        <div class="fb-container">
            <div class="fretboard" id="board"></div>
        </div>
        <div class="btn-grid" id="btns"></div>
    </div>

    <script>
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const tunings = { bass4: ['E','A','D','G'], bass5: ['B','E','A','D','G'], guitar: ['E','A','D','G','B','E'] };
        let active = [0,1,2,3], currentN = null, targetS = null;

        function render() {
            const b = document.getElementById('board'), inst = document.getElementById('inst').value, t = tunings[inst];

                if([3,5,7,9].includes(f)) div.innerHTML = '<div class="dot"></div>';
                if(f===12) div.innerHTML = '<div class="dot double-dot-top"></div><div class="dot double-dot-bottom"></div>';
                t.forEach((o, s) => {
                    const l = document.createElement('div');
                    const isEnabled = active.includes(s);
                    l.className = `str ${isEnabled?'':'disabled'}`;
                    l.style.setProperty('--t', `${2.5+(t.length-s)}px`);
                    l.dataset.n = notes[(notes.indexOf(o)+f)%12]; l.dataset.s = s;
                    l.innerHTML = '<div class="marker"></div>';
                    if(isEnabled) l.onclick = () => checkF(l.dataset.n, l);
                    div.appendChild(l);
                });
                b.appendChild(div);
            }
        }

        function updateT() {
            const c = document.getElementById('toggles'), t = tunings[document.getElementById('inst').value];
            c.innerHTML = '';
            t.forEach((n, i) => {
                const b = document.createElement('div'); b.className = `s-btn ${active.includes(i)?'active':''}`;
                b.innerText = n; b.onclick = () => {
                    active = active.includes(i) ? (active.length>1?active.filter(x=>x!==i):active) : [...active, i];
                    updateT(); render(); next();
                };
                c.appendChild(b);
            });
        }

            document.querySelectorAll('.active-n, .target').forEach(e => e.classList.remove('active-n', 'target'));
            document.getElementById('feedback').innerText = ''; targetS = null;

                const lines = Array.from(document.querySelectorAll('.str:not(.disabled)')).filter(l => pool.includes(l.dataset.n));
