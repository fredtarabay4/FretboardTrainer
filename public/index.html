<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <title>Fretboard Trainer</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'Fretboard Master','short_name':'Fretboard','start_url':'.','display':'standalone','background_color':'#1a1a1a','theme_color':'#e74c3c','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/3039/3039414.png','sizes':'512x512','type':'image/png'}]}">

    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --accent: #e74c3c;
            --text: #f0f0f0;
            --fret: #c0c0c0;
            --nut: #000;
            --string: #ddd;
            --highlight: #2ecc71;
            --inlay: #666;
            --target-string: #ffeb3b;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden; /* Prevent body scroll */
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        header { padding: 10px 0; }
        h1 { font-size: 1.4rem; margin: 0; color: var(--text); }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
            text-align: left;
            font-size: 0.9rem;
        }

        select {
            width: 100%;
            padding: 10px;
            background: #444;
            color: white;
            border: 1px solid #555;
            border-radius: 8px;
            appearance: none;
        }

        .string-selector {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 10px 0;
        }

        .string-btn {
            background: #444;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .string-btn.active { background: var(--accent); border-color: white; }

        .drill-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 140px;
        }

        #prompt-display {
            font-size: 4rem; /* Larger for Pro XL display */
            font-weight: 900;
            color: var(--highlight);
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .fretboard-container {
            overflow-x: auto;
            width: 100%;
            background: #111;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px #000;
            -webkit-overflow-scrolling: touch;
        }

        .fretboard {
            display: grid;
            background: #3d2b1f;
            min-width: 1200px; /* Wider for better spacing */
            height: 260px; /* Taller for Pro XL */
        }

        .fret {
            border-right: 2px solid var(--fret);
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-around;
        }

        .nut-style { border-right: 10px solid var(--nut) !important; background: rgba(0,0,0,0.3); }

        .fret-inlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 18px; height: 18px;
            background: var(--inlay);
            border-radius: 50%;
            z-index: 1;
        }

        .string-line {
            height: var(--thickness);
            background: var(--string);
            width: 100%;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .string-line.target-focus {
            background: var(--target-string);
            box-shadow: 0 0 15px var(--target-string);
        }

        .note-marker {
            position: absolute;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--highlight);
            left: 50%; transform: translateX(-50%);
            display: none;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }

        .active-note .note-marker { display: block; }

        .note-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px;
            border-radius: 10px;
            background: #444;
            color: white;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            touch-action: manipulation;
        }

        .feedback { font-weight: bold; font-size: 1.1rem; height: 25px; margin-top: 5px; }

        @media (orientation: landscape) {
            .fretboard { height: 200px; }
            #prompt-display { font-size: 3rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Fretboard Master</h1>
    </header>
    
    <div class="settings-grid">
        <select id="instrument-select">
            <option value="bass4">4-String Bass (EADG)</option>
            <option value="bass5">5-String Bass (BEADG)</option>
            <option value="guitar">6-String Guitar (EADGBE)</option>
        </select>
        <select id="drill-type">
            <option value="find">Find Note</option>
            <option value="target">Target String</option>
            <option value="identify">Identify</option>
        </select>
    </div>

    <div style="font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="include-accidentals" style="width: 18px; height: 18px;"> Include Sharps
    </div>

    <div class="string-selector" id="string-toggles"></div>

    <div class="drill-area">
        <div id="prompt-text" style="font-size: 1rem; opacity: 0.8;">Instruction Loading...</div>
        <div id="prompt-display">C</div>
        <div class="feedback" id="feedback"></div>
    </div>

    <div class="fretboard-container">
        <div class="fretboard" id="fretboard"></div>
    </div>

    <div class="note-buttons" id="note-buttons"></div>
</div>

<script>
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const tunings = { 
        bass4: ['E', 'A', 'D', 'G'], 
        bass5: ['B', 'E', 'A', 'D', 'G'], 
        guitar: ['E', 'A', 'D', 'G', 'B', 'E'] 
    };
    let activeStrings = [0,1,2,3], currentNote = null, targetStr = null, drill = 'find';

    function init() {
        setupListeners(); 
        renderFretboard(); 
        updateToggles(); 
        renderButtons(); 
        newRound();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch", (e) => e.respondWith(fetch(e.request)));');
        }
    }

    function setupListeners() {
        document.getElementById('instrument-select').onchange = (e) => {
            activeStrings = Array.from({length: tunings[e.target.value].length}, (_, i) => i);
            renderFretboard(); updateToggles(); newRound();
        };
        document.getElementById('drill-type').onchange = (e) => { drill = e.target.value; newRound(); };
        document.getElementById('include-accidentals').onchange = () => { renderButtons(); newRound(); };
    }

    function updateToggles() {
        const cont = document.getElementById('string-toggles');
        cont.innerHTML = '';
        tunings[document.getElementById('instrument-select').value].forEach((n, i) => {
            const b = document.createElement('div');
            b.className = `string-btn ${activeStrings.includes(i) ? 'active' : ''}`;
            b.innerText = n;
            b.onclick = () => {
                activeStrings = activeStrings.includes(i) ? (activeStrings.length > 1 ? activeStrings.filter(x => x!==i) : activeStrings) : [...activeStrings, i];
                updateToggles(); renderFretboard(); newRound();
            };
            cont.appendChild(b);
        });
    }

    function renderFretboard() {
        const board = document.getElementById('fretboard');
        const tuning = tunings[document.getElementById('instrument-select').value];
        board.innerHTML = '';
        board.style.gridTemplateColumns = `repeat(13, 1fr)`;
        for (let f = 0; f <= 12; f++) {
            const div = document.createElement('div');
            div.className = `fret ${f===0?'nut-style':''}`;
            if ([3,5,7,9].includes(f)) div.innerHTML = '<div class="fret-inlay"></div>';
            if (f===12) div.innerHTML = '<div class="fret-inlay" style="top:25%"></div><div class="fret-inlay" style="top:75%"></div>';
            tuning.forEach((o, s) => {
                const line = document.createElement('div');
                line.className = `string-line ${activeStrings.includes(s)?'':'disabled'}`;
                line.style.setProperty('--thickness', `${3+(tuning.length-s)}px`);
                line.dataset.note = getNote(o, f); line.dataset.s = s;
                line.innerHTML = '<div class="note-marker"></div>';
                if (activeStrings.includes(s)) line.onclick = () => checkFret(line.dataset.note, line);
                div.appendChild(line);
            });
            board.appendChild(div);
        }
    }

    function renderButtons() {
        const cont = document.getElementById('note-buttons');
        const acc = document.getElementById('include-accidentals').checked;
        cont.innerHTML = '';
        notes.filter(n => acc || !n.includes('#')).forEach(n => {
            const b = document.createElement('button');
            b.innerText = n; b.onclick = () => checkBtn(n);
            cont.appendChild(b);
        });
    }

    function getNote(s, sem) { return notes[(notes.indexOf(s) + sem) % 12]; }

    function newRound() {
        const acc = document.getElementById('include-accidentals').checked;
        const pool = notes.filter(n => acc || !n.includes('#'));
        document.querySelectorAll('.active-note, .target-focus').forEach(e => e.classList.remove('active-note', 'target-focus'));
        document.getElementById('feedback').innerText = '';
        targetStr = null;

        if (drill === 'identify') {
            document.getElementById('note-buttons').style.display = 'grid';
            document.getElementById('prompt-text').innerText = 'What note is this?';
            document.getElementById('prompt-display').innerText = '?';
            const lines = Array.from(document.querySelectorAll('.string-line:not(.disabled)')).filter(l => pool.includes(l.dataset.note));
            const pick = lines[Math.floor(Math.random() * lines.length)];
            pick.classList.add('active-note'); currentNote = pick.dataset.note;
        } else {
            document.getElementById('note-buttons').style.display = 'none';
            currentNote = pool[Math.floor(Math.random() * pool.length)];
            document.getElementById('prompt-display').innerText = currentNote;
            if (drill === 'target') {
                targetStr = activeStrings[Math.floor(Math.random() * activeStrings.length)];
                document.getElementById('prompt-text').innerText = `Find ${currentNote} on highlighted string:`;
                document.querySelectorAll(`.string-line[data-s="${targetStr}"]`).forEach(s => s.classList.add('target-focus'));
            } else {
                document.getElementById('prompt-text').innerText = `Find ${currentNote} anywhere:`;
            }
        }
    }

    function checkFret(n, el) {
        if (drill === 'identify') return;
        if (drill === 'target' && parseInt(el.dataset.s) !== targetStr) return;
        if (n === currentNote) { el.classList.add('active-note'); setFeedback(true); setTimeout(newRound, 800); }
        else setFeedback(false);
    }

    function checkBtn(n) {
        if (n === currentNote) { setFeedback(true); setTimeout(newRound, 800); }
        else setFeedback(false);
    }

    function setFeedback(c) {
        const f = document.getElementById('feedback');
        f.innerText = c ? "Correct! ✓" : "Try again ✗";
        f.style.color = c ? "var(--highlight)" : "var(--accent)";
    }

    init();
</script>
</body>
</html>
